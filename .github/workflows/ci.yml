# CI workflow for podman-io/skopeo-sandbox.
# Mirrors the PR-blocking tasks from the old containers/skopeo .cirrus.yml.
#
# Runners: podman-io self-hosted Oracle VM pool. Per-class labels
# (oracle-vm-Ncpu-Mgb-x86-64) target a specific size and arch.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: oracle-vm-4cpu-16gb-x86-64
    timeout-minutes: 45
    container:
      image: quay.io/libpod/skopeo_cidev:${{ vars.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v6
      - name: fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: make tools
      - run: make validate-local
      - name: vendor + tree status
        run: |
          make vendor
          hack/tree_status.sh

  doccheck:
    needs: validate
    runs-on: oracle-vm-4cpu-16gb-x86-64
    timeout-minutes: 45
    container:
      image: quay.io/libpod/fedora_podman:${{ vars.IMAGE_TAG }}
    env:
      BUILDTAGS: containers_image_openpgp
    steps:
      - uses: actions/checkout@v6
      - name: fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: remove pre-installed skopeo package
        run: dnf remove -y skopeo
      - name: build + install
        run: |
          make bin/skopeo
          make install PREFIX=/usr/local
      - run: make validate-docs

  cross:
    needs: validate
    if: "!contains(github.event.pull_request.title || github.event.head_commit.message, '[CI:DOCS]')"
    runs-on: oracle-vm-2cpu-8gb-x86-64
    timeout-minutes: 45
    container:
      image: quay.io/libpod/fedora_podman:${{ vars.IMAGE_TAG }}
    env:
      BUILDTAGS: containers_image_openpgp
    steps:
      - uses: actions/checkout@v6
      - name: fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: make local-cross

  osx:
    needs: validate
    if: "!contains(github.event.pull_request.title || github.event.head_commit.message, '[CI:DOCS]')"
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: configure GOBIN (Makefile's `tools` target installs golangci-lint to $GOBIN)
        run: |
          mkdir -p "$HOME/go/bin"
          echo "GOBIN=$HOME/go/bin" >> "$GITHUB_ENV"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: brew install gpgme (CGo dep for github.com/proglottis/gpgme)
        run: brew install gpgme
      - run: go version
      - run: make tools
      - run: make validate-local test-unit-local bin/skopeo
      - run: ./bin/skopeo -v

  test_skopeo:
    needs: validate
    if: >-
      !contains(github.event.pull_request.title || github.event.head_commit.message, '[CI:DOCS]')
      && !contains(github.event.pull_request.title || github.event.head_commit.message, '[CI:BUILD]')
    runs-on: oracle-vm-2cpu-8gb-x86-64
    timeout-minutes: 45
    name: test_skopeo / ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Skopeo Test
            buildtags: ""
            image_name: skopeo_cidev
          - name: Skopeo Test w/ openpgp
            buildtags: containers_image_openpgp
            image_name: skopeo_cidev
          - name: Skopeo Test w/ Sequoia
            buildtags: containers_image_sequoia
            # podman-sequoia is now installed in skopeo_cidev for F43+
            # (containers/automation_images@46088a81, 2025-11-21), so the
            # Cirrus-era Rawhide-VM detour isn't needed any more. The
            # original .cirrus.yml is just stale on this point — see
            # automation_images/cache_images/fedora_packaging.sh.
            image_name: skopeo_cidev
    container:
      image: quay.io/libpod/${{ matrix.image_name }}:${{ vars.IMAGE_TAG }}
      options: --privileged
    env:
      BUILDTAGS: ${{ matrix.buildtags }}
    steps:
      - uses: actions/checkout@v6
      - name: fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: make vendor
      - name: build + install
        run: |
          make bin/skopeo
          make install PREFIX=/usr/local
      - run: make test-unit-local
      - run: make test-integration-local
      - run: make test-system-local

  ostree_rs_ext:
    needs: validate
    if: "!contains(github.event.pull_request.title || github.event.head_commit.message, '[CI:DOCS]')"
    runs-on: oracle-vm-4cpu-16gb-x86-64
    timeout-minutes: 45
    container:
      image: quay.io/coreos-assembler/fcos-buildroot:testing-devel
    steps:
      - uses: actions/checkout@v6
      - name: fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: install rustup stable
        run: |
          dnf remove -y rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: build + install skopeo
        run: |
          dnf builddep -y skopeo
          make
          make install
      - name: clone ostree-rs-ext + cargo build
        run: |
          git clone --depth 1 https://github.com/ostreedev/ostree-rs-ext.git /tmp/ostree-rs-ext
          cd /tmp/ostree-rs-ext
          cargo test --no-run
      - name: cargo test
        run: |
          cd /tmp/ostree-rs-ext
          cargo test -- --nocapture --quiet

  success:
    needs: [validate, doccheck, cross, osx, test_skopeo, ostree_rs_ext]
    runs-on: oracle-vm-2cpu-8gb-x86-64
    timeout-minutes: 45
    steps:
      - run: "true"
